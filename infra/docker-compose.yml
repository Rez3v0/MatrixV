services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: matrixv
      POSTGRES_PASSWORD: password
      POSTGRES_DB: matrixv
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql://matrixv:password@db/matrixv
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=db+postgresql://matrixv:password@db/matrixv
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - db
      - redis
      - minio

  celery_worker:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A config.celery_app worker --loglevel=info
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql://matrixv:password@db/matrixv
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=db+postgresql://matrixv:password@db/matrixv
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - db
      - redis
      - backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      # 忽略宿主机 node_modules 覆盖，使用容器内安装的 node_modules
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
